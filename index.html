<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DealFinder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🔥 DealFinder</h1>
    <p>Find the best price instantly</p>
</header>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Search for products...">
</div>

<div class="controls">
    <button onclick="sortLow()">⬇ Lowest Price</button>
    <button onclick="sortHigh()">⬆ Highest Price</button>
</div>

<div id="results" class="grid"></div>

<script src="script.js"></script>

</body>
</html>
